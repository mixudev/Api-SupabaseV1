<!-- pages/dashboard.html -->
<main class="max-w-[1200px] mx-auto px-8 py-12 anim-fade-up">

  <div class="font-serif text-[2.5rem] tracking-tight mb-2">
    Device <em class="text-accent2 not-italic" style="font-style:italic">Logs</em>
  </div>
  <div class="font-mono text-[0.75rem] text-muted mb-10" id="last-updated">// memuat data...</div>

  <!-- Stats Removed -->

  <!-- Filters & Actions -->
  <div class="flex gap-4 mb-6 flex-wrap items-center">
    <div class="flex gap-4 flex-1">
      <input
        class="bg-surface border border-border text-[#f0ede6] px-4 py-[0.6rem] font-mono text-[0.8rem] outline-none transition-colors focus:border-accent placeholder:text-muted flex-1 min-w-[200px]"
        id="filter-device"
        placeholder="🔍 Cari device_id..."
        oninput="applyFilter()"
      />
      <input
        type="date"
        class="bg-surface border border-border text-[#f0ede6] px-4 py-[0.6rem] font-mono text-[0.8rem] outline-none transition-colors focus:border-accent custom-date-input"
        id="filter-date"
        onchange="applyFilter()"
      />
    </div>
    <button onclick="loadData()"
      class="border border-border text-accent2 px-[0.9rem] py-[0.6rem] font-mono text-[0.8rem] tracking-[0.06em] uppercase cursor-pointer transition-all hover:border-accent2 hover:opacity-70 bg-transparent flex items-center gap-2">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-10.26l3.08 3.52"/>
      </svg>
      Refresh
    </button>
  </div>

  <!-- Table -->
  <div class="border border-border overflow-auto" id="table-container">
    <div class="py-16 text-center font-mono text-muted text-[0.85rem]">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div class="mt-4">Memuat data...</div>
    </div>
  </div>

</main>
