<!-- pages/dashboard.html -->
<main class="max-w-[1200px] mx-auto px-8 py-12 anim-fade-up">

  <div class="mb-12 anim-fade-up">
    <h1 class="text-[2.2rem] font-serif tracking-tight text-text mb-1">
      Device <span class="text-accent italic font-medium">Monitoring</span>
    </h1>
    <div class="font-mono text-[0.7rem] text-text-dim opacity-60 tracking-wider flex items-center gap-2" id="last-updated">
      <div class="w-1.5 h-1.5 rounded-full bg-accent/40 anim-pulse"></div> memuat data...
    </div>
  </div>

  <div id="bulk-actions" class="hidden mb-6 anim-fade-up">
    <div class="bg-surface border border-danger/20 p-4 rounded-2xl flex items-center justify-between shadow-xl shadow-danger/5">
      <div class="flex items-center gap-4 pl-2">
        <div class="w-10 h-10 rounded-xl bg-danger/10 text-danger flex items-center justify-center border border-danger/20">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </div>
        <span class="font-mono text-[0.75rem] text-danger uppercase tracking-[0.1em] font-bold">
          <span id="selected-count" class="text-[1.1rem]">0</span> log terpilih
        </span>
      </div>
      <button onclick="confirmBulkDelete()" 
        class="bg-danger text-white px-8 py-3 rounded-xl font-mono text-[0.7rem] uppercase tracking-widest font-bold hover:brightness-110 active:scale-95 transition-all cursor-pointer shadow-lg shadow-danger/20">
        Hapus Masal
      </button>
    </div>
  </div>

  <div class="flex gap-4 mb-4 flex-wrap">
    <div class="relative flex-1 group">
      <input
        class="w-full bg-surface border border-border-subtle text-text px-12 py-4 rounded-2xl font-mono text-[0.8rem] outline-none transition-all focus:border-accent focus:ring-4 focus:ring-accent/10 placeholder:text-text-dim/40 shadow-sm"
        id="filter-device"
        placeholder="Cari berdasarkan Device ID..."
        oninput="applyFilter()"
      />
      <div class="absolute left-5 top-1/2 -translate-y-1/2 text-text-dim/60 group-focus-within:text-accent transition-colors">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="border border-border-subtle rounded-3xl overflow-hidden bg-surface shadow-xl shadow-black/5 mb-8" id="table-container">
     <!-- Content injected by JS -->
  </div>

  <!-- Pagination -->
  <div id="pagination" class="flex items-center justify-between px-4 font-mono text-[0.7rem] py-2">
    <div class="text-text-dim opacity-70 tracking-wide uppercase text-[0.6rem]">
      Log <span id="pag-start" class="text-text font-bold">0</span>–<span id="pag-end" class="text-text font-bold">0</span> dari <span id="pag-total" class="text-text font-bold">0</span> total
    </div>
    <div class="flex items-center gap-3">
      <button onclick="prevPage()" id="btn-prev" class="p-3 border border-border-subtle rounded-xl text-text-dim hover:text-accent hover:border-accent disabled:opacity-20 disabled:pointer-events-none transition-all cursor-pointer bg-surface hover:bg-accent/5">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
      <div id="pag-numbers" class="flex gap-2">
        <!-- Page numbers go here -->
      </div>
      <button onclick="nextPage()" id="btn-next" class="p-3 border border-border-subtle rounded-xl text-text-dim hover:text-accent hover:border-accent disabled:opacity-20 disabled:pointer-events-none transition-all cursor-pointer bg-surface hover:bg-accent/5">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>
    </div>
  </div>

</main>
