<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeyBase</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:       '#0d0d0d',
            surface:  '#161616',
            surface2: '#1e1e1e',
            border:   '#2a2a2a',
            accent:   '#c8f566',
            accent2:  '#66d4f5',
            muted:    '#6b6b6b',
            danger:   '#ff6b6b',
            warn:     '#f5a623',
            ok:       '#4ade80',
          },
          fontFamily: {
            serif:  ['"Instrument Serif"', 'serif'],
            mono:   ['"DM Mono"', 'monospace'],
            sans:   ['"DM Sans"', 'sans-serif'],
            geist:  ['Geist', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/animations.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* Custom Scrollbar Elegant Minimalist */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; border: 1px solid transparent; background-clip: content-box; }
    ::-webkit-scrollbar-thumb:hover { background-color: #444; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e2a4a; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #66d4f5; }
  </style>
</head>
<body class="bg-bg text-[#f0ede6] font-sans font-light min-h-screen">

  <!-- LOGIN PAGE -->
  <div id="login-page"></div>

  <!-- APP SHELL -->
  <div id="app" class="hidden flex-col min-h-screen">
    <div id="header-partial"></div>

    <!-- PAGES -->
    <div id="page-dashboard" class="page hidden"></div>
    <div id="page-keyvault" class="page hidden"></div>
    <div id="page-api" class="page hidden"></div>
    <div id="page-docs" class="page hidden"></div>
  </div>

  <!-- MODAL -->
  <div id="modal-details-partial"></div>

  <!-- PARTIALS LOADER -->
  <script src="js/partials.js"></script>
  <!-- CORE APP -->
  <script src="js/app.js"></script>
  <!-- KEY VAULT CRYPTO -->
  <script src="js/keyvault.js"></script>

</body>
</html>
