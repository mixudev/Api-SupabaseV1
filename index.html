<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeyBase</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:       'var(--bg)',
            surface:  'var(--surface)',
            surface2: 'var(--surface2)',
            border:   'var(--border)',
            accent:   'var(--accent)',
            accent2:  'var(--accent2)',
            muted:    'var(--muted)',
            danger:   'var(--danger)',
            warn:     'var(--warn)',
            ok:       'var(--ok)',
          },
          fontFamily: {
            serif:  ['"Instrument Serif"', 'serif'],
            mono:   ['"DM Mono"', 'monospace'],
            sans:   ['"DM Sans"', 'sans-serif'],
            geist:  ['Geist', 'sans-serif'],
          },
        }
      }
    }

    // Theme Early Initialization
    (function() {
      const t = localStorage.getItem('theme') || 'system';
      if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else if (t === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <link rel="stylesheet" href="css/colors.css" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body class="bg-bg text-[#f0ede6] font-sans font-light min-h-screen">

  <!-- LOGIN PAGE -->
  <div id="login-page"></div>

  <!-- APP SHELL -->
  <div id="app" class="hidden flex-col min-h-screen">
    <div id="header-partial"></div>

    <!-- PAGES -->
    <div id="page-dashboard" class="page hidden"></div>
    <div id="page-keyvault" class="page hidden"></div>
    <div id="page-api" class="page hidden"></div>
  </div>

  <!-- MODAL -->
  <div id="modal-details-partial"></div>
  <div id="confirm-modal-partial"></div>

  <!-- PARTIALS LOADER -->
  <script src="js/partials.js"></script>
  <!-- CORE APP -->
  <script src="js/app.js"></script>
  <!-- KEY VAULT CRYPTO -->
  <script src="js/keyvault.js"></script>

</body>
</html>
