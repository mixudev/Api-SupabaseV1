<!-- partials/header.html -->
<!-- CATATAN: semua JS (toggleMobileMenu, closeMobileMenu) ada di app.js -->

<header class="border-b border-border px-6 flex items-center justify-between h-14 sticky top-0 z-[100]"
  style="background: rgba(13,13,13,0.94); backdrop-filter: blur(12px);">

  <div class="flex items-center gap-8">
    <div class="font-serif text-[1.3rem] tracking-tight whitespace-nowrap">
      Device<span class="text-accent italic">Monitor</span>
    </div>

    <!-- Desktop nav -->
    <nav class="hidden md:flex">
      <button
        class="nav-tab active bg-transparent border-none text-muted px-[1.1rem] h-14 font-mono text-[0.72rem] tracking-[0.08em] uppercase cursor-pointer transition-colors hover:text-[#f0ede6] flex items-center gap-2 relative"
        id="tab-dashboard" onclick="switchTab('dashboard')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        Dashboard
        <div class="nav-tab-indicator"></div>
      </button>
      <button
        class="nav-tab bg-transparent border-none text-muted px-[1.1rem] h-14 font-mono text-[0.72rem] tracking-[0.08em] uppercase cursor-pointer transition-colors hover:text-[#f0ede6] flex items-center gap-2 relative"
        id="tab-keyvault" onclick="switchTab('keyvault')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
        </svg>
        Key Vault
        <div class="nav-tab-indicator"></div>
      </button>
    </nav>
  </div>

  <!-- Right -->
  <div class="flex items-center gap-3">
    <span class="font-mono text-[0.72rem] text-muted hidden lg:inline" id="user-email-display"></span>
    <button onclick="loadData()"
      class="hidden sm:block border border-border text-accent2 px-[0.9rem] py-[0.4rem] font-mono text-[0.68rem] tracking-[0.06em] uppercase cursor-pointer transition-all hover:border-accent2 hover:opacity-70 bg-transparent">
      ↻ Refresh
    </button>
    <button onclick="handleLogout()"
      class="hidden sm:block border border-border text-muted px-[0.9rem] py-[0.4rem] font-mono text-[0.68rem] tracking-[0.06em] uppercase cursor-pointer transition-all hover:border-danger hover:text-danger bg-transparent">
      Keluar
    </button>
    <!-- Hamburger (mobile only) -->
    <button id="mobile-menu-btn" onclick="toggleMobileMenu()"
      class="md:hidden flex flex-col justify-center items-center w-9 h-9 border border-border bg-transparent cursor-pointer gap-[5px] transition-colors hover:border-accent"
      aria-label="Toggle menu">
      <span id="ham-1" class="block w-4 h-[1.5px] bg-[#6b6b6b] transition-all duration-300 origin-center"></span>
      <span id="ham-2" class="block w-4 h-[1.5px] bg-[#6b6b6b] transition-all duration-300"></span>
      <span id="ham-3" class="block w-4 h-[1.5px] bg-[#6b6b6b] transition-all duration-300 origin-center"></span>
    </button>
  </div>
</header>

<!-- Mobile Dropdown -->
<div id="mobile-menu" class="hidden border-b border-border relative z-[99]"
  style="background: rgba(13,13,13,0.97); backdrop-filter: blur(12px);">
  <div class="px-4 py-3 flex flex-col gap-1">
    <button id="mob-tab-dashboard" onclick="switchTab('dashboard'); closeMobileMenu()"
      class="mob-nav-item w-full flex items-center gap-3 px-4 py-3 font-mono text-[0.75rem] tracking-[0.08em] uppercase text-left cursor-pointer border border-transparent rounded transition-colors hover:border-border hover:bg-surface bg-transparent text-accent">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>Dashboard
    </button>
    <button id="mob-tab-keyvault" onclick="switchTab('keyvault'); closeMobileMenu()"
      class="mob-nav-item w-full flex items-center gap-3 px-4 py-3 font-mono text-[0.75rem] tracking-[0.08em] uppercase text-left cursor-pointer border border-transparent rounded transition-colors hover:border-border hover:bg-surface bg-transparent text-muted">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
      </svg>Key Vault
    </button>
  </div>
  <div class="h-px bg-border mx-4"></div>
  <div class="px-4 py-4 flex flex-col gap-3">
    <div class="font-mono text-[0.68rem] text-muted px-4 truncate" id="mob-user-email"></div>
    <div class="flex gap-2">
      <button onclick="loadData(); closeMobileMenu()"
        class="flex-1 border border-border text-accent2 px-3 py-[0.5rem] font-mono text-[0.68rem] tracking-[0.06em] uppercase cursor-pointer transition-all hover:border-accent2 hover:opacity-70 bg-transparent">
        ↻ Refresh
      </button>
      <button onclick="handleLogout()"
        class="flex-1 border border-border text-muted px-3 py-[0.5rem] font-mono text-[0.68rem] tracking-[0.06em] uppercase cursor-pointer transition-all hover:border-danger hover:text-danger bg-transparent">
        Keluar
      </button>
    </div>
  </div>
</div>
