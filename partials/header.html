<!-- partials/header.html -->
<header class="border-b border-border px-8 flex items-center justify-between h-14 sticky top-0 z-[100]"
  style="background: rgba(13,13,13,0.94); backdrop-filter: blur(12px);">

  <!-- Left: Logo + Nav -->
  <div class="flex items-center gap-10">
    <div class="font-serif text-[1.3rem] tracking-tight whitespace-nowrap">
      Device<span class="text-accent italic">Monitor</span>
    </div>

    <nav class="flex">
      <button
        class="nav-tab active bg-transparent border-none text-muted px-[1.1rem] h-14 font-mono text-[0.72rem] tracking-[0.08em] uppercase cursor-pointer transition-colors hover:text-[#f0ede6] flex items-center gap-2 relative"
        id="tab-dashboard"
        onclick="switchTab('dashboard')"
      >
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        <span class="hidden sm:inline">Dashboard</span>
        <div class="nav-tab-indicator"></div>
      </button>

      <button
        class="nav-tab bg-transparent border-none text-muted px-[1.1rem] h-14 font-mono text-[0.72rem] tracking-[0.08em] uppercase cursor-pointer transition-colors hover:text-[#f0ede6] flex items-center gap-2 relative"
        id="tab-keyvault"
        onclick="switchTab('keyvault')"
      >
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
        </svg>
        <span class="hidden sm:inline">Key Vault</span>
        <div class="nav-tab-indicator"></div>
      </button>
    </nav>
  </div>

  <!-- Right: User info + actions -->
  <div class="flex items-center gap-5">
    <span class="user-email font-mono text-[0.72rem] text-muted hidden md:inline" id="user-email-display"></span>

    <button
      onclick="loadData()"
      class="border border-border text-accent2 px-[0.9rem] py-[0.4rem] font-mono text-[0.68rem] tracking-[0.06em] uppercase cursor-pointer transition-all hover:border-accent2 hover:opacity-70 bg-transparent"
    >
      ↻ Refresh
    </button>

    <button
      onclick="handleLogout()"
      class="border border-border text-muted px-[0.9rem] py-[0.4rem] font-mono text-[0.68rem] tracking-[0.06em] uppercase cursor-pointer transition-all hover:border-danger hover:text-danger bg-transparent"
    >
      Keluar
    </button>
  </div>
</header>
