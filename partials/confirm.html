<!-- partials/confirm.html -->
<div 
  id="modal-confirm" 
  class="modal-overlay fixed inset-0 hidden items-center justify-center z-[2000] p-4"
  style="background: rgba(2, 6, 23, 0.7); backdrop-filter: blur(12px);"
  onclick="if(event.target===this) closeConfirm()"
>
  <div class="modal-card bg-surface border border-border w-full max-w-[380px] rounded-[24px] overflow-hidden shadow-2xl anim-fade-up">
    <div class="p-8 text-center">
      
      <!-- Styled Icon -->
      <div id="confirm-icon" class="w-16 h-16 rounded-full bg-danger/10 text-danger flex items-center justify-center mx-auto mb-6 border border-danger/20 shadow-inner">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>

      <!-- Content -->
      <h3 id="confirm-title" class="text-[1.4rem] font-serif tracking-tight text-text mb-2">Konfirmasi Tindakan</h3>
      <p id="confirm-msg" class="text-text-dim text-[0.85rem] leading-relaxed mb-10 px-2 opacity-80">
        Apakah Anda yakin ingin melanjutkan tindakan ini? Perubahan mungkin tidak dapat dibatalkan.
      </p>
      
      <!-- Actions -->
      <div class="flex flex-col gap-3">
        <button id="confirm-btn-ok" 
                class="w-full px-6 py-4 bg-danger text-white rounded-2xl font-mono text-[0.75rem] font-bold uppercase tracking-[0.1em] hover:brightness-110 active:scale-[0.98] transition-all cursor-pointer shadow-lg shadow-danger/20">
          Ya, Lanjutkan
        </button>
        <button onclick="closeConfirm()" 
                class="w-full px-6 py-4 bg-transparent text-text-dim rounded-2xl font-mono text-[0.7rem] uppercase tracking-widest hover:text-text hover:bg-surface2 transition-all cursor-pointer border border-transparent hover:border-border">
          Batalkan
        </button>
      </div>

    </div>
  </div>
</div>
