<!-- partials/confirm.html -->
<div 
  id="modal-confirm" 
  class="modal-overlay fixed inset-0 hidden items-center justify-center z-[2000] p-4"
  style="background: rgba(4, 7, 12, 0.6); backdrop-filter: blur(8px);"
>
  <div class="modal-card bg-surface border border-border w-full max-w-[400px] rounded-2xl overflow-hidden shadow-2xl anim-fade-up">
    <div class="p-8 text-center">
      <div id="confirm-icon" class="w-12 h-12 rounded-full bg-danger/10 text-danger flex items-center justify-center mx-auto mb-6">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <h3 id="confirm-title" class="text-[1.2rem] font-serif tracking-tight mb-2">Konfirmasi</h3>
      <p id="confirm-msg" class="text-muted text-[0.85rem] leading-relaxed mb-8">Apakah Anda yakin ingin melanjutkan tindakan ini?</p>
      
      <div class="flex gap-3">
        <button onclick="closeConfirm()" 
                class="flex-1 px-4 py-3 border border-border rounded-xl font-mono text-[0.7rem] uppercase tracking-wider text-muted hover:bg-surface2 transition-colors cursor-pointer">
          Batal
        </button>
        <button id="confirm-btn-ok" 
                class="flex-1 px-4 py-3 bg-danger text-white rounded-xl font-mono text-[0.7rem] uppercase tracking-wider hover:opacity-90 transition-opacity cursor-pointer">
          Ya, Lanjutkan
        </button>
      </div>
    </div>
  </div>
</div>
