<!-- partials/modal.html -->
<div id="modal-details" class="fixed inset-0 hidden items-center justify-center z-[1500] p-4"
  style="background: rgba(2, 6, 23, 0.7); backdrop-filter: blur(12px);" onclick="if(event.target===this) closeModal()">
  
  <div class="bg-surface border border-border-subtle w-full max-w-[650px] rounded-[32px] overflow-hidden shadow-2xl anim-fade-up flex flex-col max-h-[90vh]">
    <!-- Header -->
    <div class="px-8 py-6 border-b border-border-subtle flex items-center justify-between bg-accent/[0.02]">
      <div>
        <h2 class="text-[1.4rem] font-serif tracking-tight text-text" id="modal-device-id">Device Details</h2>
        <p class="text-[0.7rem] font-mono text-text-dim opacity-50 uppercase tracking-widest mt-1" id="modal-timestamp">TIMESTAMP</p>
      </div>
      <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface2 text-text-dim hover:text-text hover:bg-border transition-all cursor-pointer">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Content -->
    <div class="p-8 overflow-y-auto space-y-8">
      
      <!-- Grid Info -->
      <div class="grid grid-cols-2 sm:grid-cols-3 gap-6">
        <div class="space-y-1">
          <div class="text-[0.6rem] font-mono text-text-dim uppercase tracking-widest opacity-60">Status</div>
          <div id="modal-status" class="font-mono text-[0.8rem] font-bold"></div>
        </div>
        <div class="space-y-1">
          <div class="text-[0.6rem] font-mono text-text-dim uppercase tracking-widest opacity-60">App Version</div>
          <div id="modal-version" class="text-text font-mono text-[0.8rem]"></div>
        </div>
      </div>

      <div class="h-px bg-border-subtle w-full"></div>

      <!-- Security Keys -->
      <div class="space-y-6">
        <div class="space-y-2">
          <div class="flex items-center justify-between">
            <label class="text-[0.65rem] font-mono text-text-dim uppercase tracking-[0.2em] font-bold opacity-60">Ephemeral Public Key</label>
            <button onclick="copyToClipboard(document.getElementById('modal-pub-key').textContent, this)" class="text-[0.6rem] font-mono text-accent hover:underline uppercase font-bold tracking-tighter">Salin</button>
          </div>
          <div class="bg-bg border border-border-subtle p-4 rounded-2xl font-mono text-[0.7rem] break-all leading-relaxed text-text-dim/80 shadow-inner" id="modal-pub-key"></div>
        </div>

        <div class="space-y-2">
          <div class="flex items-center justify-between">
            <label class="text-[0.65rem] font-mono text-text-dim uppercase tracking-[0.2em] font-bold opacity-60">Encrypted AES-256 Key</label>
            <button onclick="copyToClipboard(document.getElementById('modal-enc-key').textContent, this)" class="text-[0.6rem] font-mono text-accent hover:underline uppercase font-bold tracking-tighter">Salin</button>
          </div>
          <div class="bg-bg border border-border-subtle p-4 rounded-2xl font-mono text-[0.7rem] break-all leading-relaxed text-text-dim/80 shadow-inner" id="modal-enc-key"></div>
        </div>
      </div>

      <!-- Result Key (Hidden Initially) -->
      <div id="result-container" class="hidden anim-fade-up">
        <div class="bg-accent/10 border border-accent/20 p-6 rounded-3xl space-y-4 shadow-xl shadow-accent/5">
          <div class="flex items-center justify-between">
            <span class="text-[0.65rem] font-bold font-mono text-accent uppercase tracking-widest">Restored Original Key</span>
            <span class="px-2 py-0.5 bg-accent text-white text-[0.6rem] rounded font-mono font-bold">DECRYPTED</span>
          </div>
          <div class="font-mono text-[1.1rem] text-text font-bold text-center tracking-widest break-all select-all py-2" id="decrypted-result"></div>
        </div>
      </div>

    </div>

    <!-- Footer Action -->
    <div class="px-8 py-6 bg-surface2/30 border-t border-border-subtle">
      <button id="btn-restore" onclick="handleRestore()" 
        class="w-full bg-accent text-white py-4 rounded-2xl font-mono text-[0.75rem] font-bold uppercase tracking-[0.15em] shadow-lg shadow-accent/20 hover:brightness-110 active:scale-[0.98] transition-all cursor-pointer flex items-center justify-center gap-3 group">
        <svg class="group-hover:rotate-12 transition-transform" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l2.25 2.25M15.5 7.5l2.25-2.25" /></svg>
        Pulihkan Kunci (X25519)
      </button>
    </div>

  </div>
</div>
