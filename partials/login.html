<!-- partials/login.html -->
<div class="flex items-center justify-center min-h-screen p-8">
  <div class="w-full max-w-[420px] border border-border bg-surface p-12 px-10 relative anim-fade-up-slow" style="position:relative">
    <!-- top accent line -->
    <div class="absolute top-0 left-0 right-0 h-[2px]" style="background: linear-gradient(90deg, #c8f566, #66d4f5)"></div>

    <div class="font-serif text-[2rem] tracking-tight mb-1">
      Device<span class="text-accent italic">Monitor</span>
    </div>
    <div class="font-mono text-[0.82rem] text-muted tracking-widest mb-10">
      // masuk untuk mengakses dashboard
    </div>

    <label class="block text-[0.72rem] font-mono text-muted tracking-[0.08em] uppercase mb-2" for="email">Email</label>
    <input
      type="email" id="email"
      placeholder="kamu@email.com"
      autocomplete="email"
      class="w-full bg-bg border border-border text-[#f0ede6] px-4 py-3 font-sans text-[0.95rem] outline-none transition-colors focus:border-accent placeholder:text-muted mb-5"
    />

    <label class="block text-[0.72rem] font-mono text-muted tracking-[0.08em] uppercase mb-2" for="password">Password</label>
    <input
      type="password" id="password"
      placeholder="••••••••"
      autocomplete="current-password"
      class="w-full bg-bg border border-border text-[#f0ede6] px-4 py-3 font-sans text-[0.95rem] outline-none transition-colors focus:border-accent placeholder:text-muted mb-6"
    />

    <button
      id="login-btn"
      onclick="handleLogin()"
      class="w-full bg-accent text-bg border-none py-[0.9rem] font-mono text-[0.85rem] font-medium tracking-[0.08em] uppercase cursor-pointer transition-all hover:opacity-90 hover:-translate-y-px disabled:opacity-40 disabled:cursor-not-allowed disabled:translate-y-0"
    >
      Masuk →
    </button>

    <div class="error-msg text-danger text-[0.8rem] font-mono mt-4 hidden" id="login-error"></div>
  </div>
</div>
